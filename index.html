<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Intuonext</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg"/>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;600;800&display=swap');

  :root {
    --bg:       #0a0c10;
    --panel:    #0f1218;
    --border:   #1e2530;
    --accent:   #D4501A;
    --accent2:  #2E6DA4;
    --text:     #c8d0dc;
    --muted:    #4a5568;
    --success:  #38c97a;
    --error:    #ff4d6a;
    --header-h: 54px;
    --app-h: 100dvh;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 13px; overflow: hidden; }

  /* ── HEADER ── */
  #header { height: var(--header-h); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid var(--border); background: var(--panel); }
  #header .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 16px; letter-spacing: 0.05em; color: #fff; }
  #header .logo span { color: var(--accent); }
  #status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); display: inline-block; margin-right: 6px; transition: background 0.3s; }
  #status-dot.connected { background: var(--success); box-shadow: 0 0 6px var(--success); }
  #status-dot.error { background: var(--error); }
  #status-label { font-size: 11px; color: var(--muted); }
  #connect-btn { background: var(--accent); color: #fff; border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 500; letter-spacing: 0.05em; transition: opacity 0.2s; }
  #connect-btn:hover { opacity: 0.85; }

  /* ── LOGIN ── */
  #login-overlay { position: fixed; inset: 0; background: rgba(10,12,16,0.97); display: flex; align-items: center; justify-content: center; z-index: 200; }
  .login-box { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 40px; width: 90%; max-width: 380px; }
  .login-box h2 { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 20px; color: #fff; margin-bottom: 6px; }
  .login-box p { color: var(--muted); font-size: 11px; margin-bottom: 28px; }
  .login-box input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 10px 12px; border-radius: 4px; font-family: 'JetBrains Mono', monospace; font-size: 13px; margin-bottom: 10px; outline: none; }
  .login-box input:focus { border-color: var(--accent2); }
  .login-box button { width: 100%; background: var(--accent); color: #fff; border: none; padding: 11px; border-radius: 4px; cursor: pointer; font-family: 'Syne', sans-serif; font-weight: 600; font-size: 13px; margin-top: 6px; transition: opacity 0.2s; }
  .login-box button:hover { opacity: 0.85; }
  .login-error { color: var(--error); font-size: 11px; margin-top: 8px; display: none; }

  /* ── MAIN LAYOUT — DESKTOP ── */
  #main { display: grid; grid-template-columns: 240px 1fr 320px; grid-template-rows: calc(var(--app-h) - var(--header-h)); height: calc(var(--app-h) - var(--header-h)); }

  /* ── FILE BROWSER ── */
  #filebrowser { border-right: 1px solid var(--border); background: var(--panel); display: flex; flex-direction: column; overflow: hidden; }
  .panel-title { padding: 10px 14px; font-size: 10px; letter-spacing: 0.1em; color: var(--muted); text-transform: uppercase; font-weight: 500; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .panel-title button { background: none; border: 1px solid var(--border); color: var(--muted); padding: 2px 7px; border-radius: 3px; cursor: pointer; font-size: 10px; font-family: 'JetBrains Mono', monospace; }
  .panel-title button:hover { border-color: var(--accent2); color: var(--accent2); }
  #file-path-bar { padding: 6px 14px; font-size: 11px; color: var(--accent2); border-bottom: 1px solid var(--border); background: var(--bg); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #file-list { flex: 1; overflow-y: auto; padding: 4px 0; }
  .file-entry { display: flex; align-items: center; gap: 7px; padding: 6px 14px; cursor: pointer; transition: background 0.15s; font-size: 12px; color: var(--text); }
  .file-entry:hover { background: rgba(74,158,255,0.08); }
  .file-entry .icon { font-size: 12px; opacity: 0.7; width: 14px; text-align: center; }
  #file-editor { display: none; flex-direction: column; border-top: 1px solid var(--border); }
  #file-editor.visible { display: flex; height: 200px; }
  #file-editor textarea { flex: 1; background: var(--bg); color: var(--text); border: none; padding: 10px 14px; font-family: 'JetBrains Mono', monospace; font-size: 12px; resize: none; outline: none; }
  #file-editor-actions { display: flex; gap: 6px; padding: 6px 10px; border-top: 1px solid var(--border); background: var(--panel); }
  #file-editor-actions button { background: none; border: 1px solid var(--border); color: var(--text); padding: 3px 10px; border-radius: 3px; cursor: pointer; font-size: 11px; font-family: 'JetBrains Mono', monospace; }
  #file-editor-actions .save-btn { background: var(--success); border-color: var(--success); color: #000; }
  #upload-zone { border-top: 1px solid var(--border); padding: 10px 14px; background: var(--panel); }
  #drop-area { border: 1px dashed var(--border); border-radius: 4px; padding: 10px; text-align: center; color: var(--muted); font-size: 11px; cursor: pointer; transition: border-color 0.2s, color 0.2s; }
  #drop-area:hover, #drop-area.dragover { border-color: var(--accent2); color: var(--accent2); }
  #file-input { display: none; }

  /* ── CHAT ── */
  #chatpanel { display: flex; flex-direction: column; overflow: hidden; }
  #chat-messages { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 14px; }
  .msg { display: flex; flex-direction: column; gap: 4px; max-width: 92%; }
  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.assistant { align-self: flex-start; }
  .msg-bubble { padding: 10px 14px; border-radius: 6px; line-height: 1.6; font-size: 12.5px; white-space: pre-wrap; word-break: break-word; }
  .msg.user .msg-bubble { background: var(--accent); color: #fff; border-bottom-right-radius: 2px; }
  .msg.assistant .msg-bubble { background: var(--panel); border: 1px solid var(--border); border-bottom-left-radius: 2px; }
  .msg-label { font-size: 10px; color: var(--muted); letter-spacing: 0.05em; }
  #chat-typing { padding: 8px 20px; font-size: 11px; color: var(--muted); display: none; align-items: center; gap: 8px; }
  .dot-anim span { display: inline-block; width: 5px; height: 5px; background: var(--accent); border-radius: 50%; margin: 0 1px; animation: bounce 1s infinite; }
  .dot-anim span:nth-child(2) { animation-delay: 0.15s; }
  .dot-anim span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-5px)} }
  #chat-input-row { display: flex; gap: 8px; padding: 12px 16px; border-top: 1px solid var(--border); background: var(--panel); align-items: center; }
  #chat-input { flex: 1; min-width: 0; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 9px 12px; border-radius: 4px; font-family: 'JetBrains Mono', monospace; font-size: 12.5px; outline: none; resize: none; height: 40px; min-height: 40px; max-height: 120px; overflow-y: hidden; }
  #chat-input:focus { border-color: var(--accent2); }
  #send-btn { background: var(--accent); border: none; color: #fff; width: 44px; height: 40px; flex-shrink: 0; border-radius: 4px; cursor: pointer; font-size: 18px; line-height: 1; transition: opacity 0.2s; display: flex; align-items: center; justify-content: center; padding: 0; }
  #send-btn:hover { opacity: 0.85; }
  #kill-btn { background: none; border: 1px solid var(--error); color: var(--error); padding: 0 10px; border-radius: 4px; cursor: pointer; font-size: 11px; display: none; font-family: 'JetBrains Mono', monospace; }
  #kill-btn.visible { display: flex; align-items: center; }

  /* ── TERMINAL ── */
  #terminal-panel { border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }
  #terminal-output { flex: 1; overflow-y: auto; padding: 12px 14px; font-size: 11.5px; line-height: 1.7; color: #8fa3b0; white-space: pre-wrap; word-break: break-all; }
  #terminal-output .t-success { color: var(--success); }
  #terminal-output .t-error { color: var(--error); }
  #terminal-output .t-accent { color: var(--accent2); }
  #terminal-clear { padding: 6px 14px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; }
  #terminal-clear button { background: none; border: 1px solid var(--border); color: var(--muted); padding: 3px 10px; border-radius: 3px; cursor: pointer; font-size: 10px; font-family: 'JetBrains Mono', monospace; }

  /* ── DRAWER OVERLAY ── */
  #drawer-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 98; }
  #drawer-overlay.show { display: block; }

  /* ── MOBILE FAB BUTTONS ── */
  #fab-files, #fab-terminal { display: none; }

  /* ── SCROLLBARS ── */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── TOAST ── */
  #toast { position: fixed; bottom: 80px; right: 20px; background: var(--panel); border: 1px solid var(--border); color: var(--text); padding: 10px 16px; border-radius: 5px; font-size: 12px; opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 200; }
  #toast.show { opacity: 1; }

  /* ── MOBILE ── */
  @media (max-width: 700px) {
    html, body { overflow: visible; }
    #main { grid-template-columns: 1fr; grid-template-rows: calc(var(--app-h) - var(--header-h)); overflow: hidden; }

    /* File browser and terminal become drawers */
    #filebrowser {
      position: fixed; top: 0; left: -85vw; width: 85vw; height: var(--app-h);
      z-index: 99; transition: left 0.28s cubic-bezier(0.4,0,0.2,1);
      border-right: 1px solid var(--border);
    }
    #filebrowser.drawer-open { left: 0; }

    #terminal-panel {
      position: fixed; top: 0; right: -85vw; width: 85vw; height: var(--app-h);
      z-index: 99; transition: right 0.28s cubic-bezier(0.4,0,0.2,1);
      border-left: 1px solid var(--border);
    }
    #terminal-panel.drawer-open { right: 0; }

    /* Chat takes full width */
    #chatpanel { grid-column: 1; }

    /* FAB buttons — inline inside input bar, dimmed until tapped */
    #fab-files, #fab-terminal {
      display: flex; align-items: center; justify-content: center;
      width: 36px; height: 36px; flex-shrink: 0;
      border-radius: 50%; border: none; cursor: pointer;
      font-size: 15px; z-index: 100;
      opacity: 0.4;
      transition: opacity 0.2s, transform 0.1s;
      position: static;
    }
    #fab-files:active, #fab-terminal:active { opacity: 1; transform: scale(1.12); }
    #fab-files { background: var(--accent2); color: #fff; }
    #fab-terminal { background: var(--panel); color: var(--text); border: 1px solid var(--border); }

    /* Input row on mobile: FABs flank the textarea */
    #chat-input-row {
      padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px));
      align-items: center;
    }

    /* Drawer close buttons */
    .drawer-close { display: flex !important; }

    /* Larger touch targets */
    .file-entry { padding: 10px 14px; }
    #chat-input { font-size: 16px; } /* prevents iOS zoom */
    #status-label { display: none; }
  }

  .drawer-close {
    display: none;
    background: none; border: none; color: var(--muted);
    font-size: 18px; cursor: pointer; padding: 0 4px;
  }
</style>
</head>
<body>

<!-- LOGIN OVERLAY -->
<div id="login-overlay">
  <div class="login-box">
    <h2>Intuo<span style="color:var(--accent)">next</span></h2>
    <p>Intuo / Prime & Mite — 30 May 2026</p>
    <input type="text" id="server-url" placeholder="Server URL (e.g. https://xxxx.trycloudflare.com)" autocomplete="off"/>
    <input type="password" id="secret-input" placeholder="Secret key" onkeydown="if(event.key==='Enter') doConnect()"/>
    <button onclick="doConnect()">Connect</button>
    <div class="login-error" id="login-error">Connection failed — check URL and secret.</div>
  </div>
</div>

<!-- DRAWER OVERLAY -->
<div id="drawer-overlay" onclick="closeDrawers()"></div>

<!-- HEADER -->
<div id="header">
  <div class="logo">Intuo<span>next</span></div>
  <div style="display:flex;align-items:center;gap:10px;">
    <span id="status-dot"></span>
    <span id="status-label">Disconnected</span>
    <button id="disconnect-btn" onclick="doDisconnect()" style="display:none;background:none;border:1px solid var(--error);color:var(--error);padding:6px 14px;border-radius:4px;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:11px;transition:opacity 0.2s;">⏻ Disconnect</button>
    <button id="connect-btn" onclick="showLogin()">⚙ Config</button>
  </div>
</div>

<!-- MAIN -->
<div id="main">

  <!-- FILE BROWSER (drawer on mobile) -->
  <div id="filebrowser">
    <div class="panel-title">
      Files
      <div style="display:flex;gap:6px;align-items:center;">
        <button onclick="loadFiles('')">↺ Root</button>
        <button class="drawer-close" onclick="closeDrawers()">✕</button>
      </div>
    </div>
    <div id="file-path-bar">/</div>
    <div id="file-list"></div>
    <div id="file-editor">
      <textarea id="editor-textarea" spellcheck="false"></textarea>
      <div id="file-editor-actions">
        <button class="save-btn" onclick="saveFile()">Save</button>
        <button onclick="closeEditor()">Close</button>
        <span id="editor-filename" style="font-size:10px;color:var(--muted);align-self:center;margin-left:4px;"></span>
      </div>
    </div>
    <div id="upload-zone">
      <div id="drop-area" onclick="document.getElementById('file-input').click()">↑ Upload files (click or drag)</div>
      <input type="file" id="file-input" multiple onchange="uploadFiles(this.files)"/>
    </div>
  </div>

  <!-- CHAT -->
  <div id="chatpanel">
    <div class="panel-title">Chat with Claude Code</div>
    <div id="chat-messages"></div>
    <div id="chat-typing">
      <div class="dot-anim"><span></span><span></span><span></span></div>
      Claude Code is working...
    </div>
    <div id="chat-input-row">
      <button id="fab-files" onclick="openDrawer('files')" title="Files">📁</button>
      <textarea id="chat-input" placeholder="Chat input"></textarea>
      <button id="kill-btn" onclick="killProcess()">■ Stop</button>
      <button id="fab-terminal" onclick="openDrawer('terminal')" title="Terminal">⌨</button>
      <button id="send-btn" onclick="sendChat()">➤</button>
    </div>
  </div>

  <!-- TERMINAL (drawer on mobile) -->
  <div id="terminal-panel">
    <div class="panel-title">
      Terminal Output
      <div style="display:flex;gap:6px;align-items:center;">
        <button onclick="clearTerminal()">Clear</button>
        <button class="drawer-close" onclick="closeDrawers()">✕</button>
      </div>
    </div>
    <div id="terminal-output"></div>
    <div id="terminal-clear" style="display:none;"></div>
  </div>

</div>


<div id="toast"></div>

<script>
let serverUrl = localStorage.getItem("cc_url") || "";
let secret    = localStorage.getItem("cc_secret") || "";
let ws        = null;
let currentPath = "";
let editingPath = "";
let busy = false;

document.getElementById("server-url").value = serverUrl;

// ── DRAWERS ───────────────────────────────────────────────────────────────────
function openDrawer(which) {
  closeDrawers();
  if (which === 'files') document.getElementById("filebrowser").classList.add("drawer-open");
  if (which === 'terminal') document.getElementById("terminal-panel").classList.add("drawer-open");
  document.getElementById("drawer-overlay").classList.add("show");
}
function closeDrawers() {
  document.getElementById("filebrowser").classList.remove("drawer-open");
  document.getElementById("terminal-panel").classList.remove("drawer-open");
  document.getElementById("drawer-overlay").classList.remove("show");
}

// ── LOGIN ─────────────────────────────────────────────────────────────────────
function showLogin() { document.getElementById("login-overlay").style.display = "flex"; }

async function doConnect() {
  const url = document.getElementById("server-url").value.trim().replace(/\/$/, "");
  const sec = document.getElementById("secret-input").value.trim();
  if (!url || !sec) return;
  try {
    const r = await fetch(`${url}/api/files?path=&secret=${sec}`);
    if (!r.ok) throw new Error("bad");
    serverUrl = url; secret = sec;
    localStorage.setItem("cc_url", url);
    localStorage.setItem("cc_secret", sec);
    document.getElementById("login-overlay").style.display = "none";
    document.getElementById("login-error").style.display = "none";
    initWS(); loadFiles("");
  } catch { document.getElementById("login-error").style.display = "block"; }
}

if (serverUrl && secret) {
  document.getElementById("login-overlay").style.display = "none";
  initWS(); loadFiles("");
}

// ── WEBSOCKET ─────────────────────────────────────────────────────────────────
function initWS() {
  if (ws) { ws.close(); ws = null; }
  const wsUrl = serverUrl.replace(/^http/, "ws") + `?secret=${secret}`;
  ws = new WebSocket(wsUrl);
  ws.onopen = () => setStatus("connected", "Connected");
  ws.onclose = () => { setStatus("error", "Disconnected"); setTimeout(initWS, 5000); };
  ws.onerror = () => setStatus("error", "Error");
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === "terminal") appendTerminal(msg.data);
    if (msg.type === "chat")     appendAssistant(msg.data);
    if (msg.type === "error")    appendAssistant("⚠ Error: " + msg.data);
    if (msg.type === "chat" || msg.type === "error") setBusy(false);
  };
}

function setStatus(cls, label) {
  document.getElementById("status-dot").className = cls;
  document.getElementById("status-label").textContent = label;
  document.getElementById("disconnect-btn").style.display = cls === "connected" ? "inline-block" : "none";
}

function doDisconnect() {
  if (ws) { ws.onclose = null; ws.close(); ws = null; }
  localStorage.removeItem("cc_url"); localStorage.removeItem("cc_secret");
  serverUrl = ""; secret = "";
  setStatus("error", "Disconnected");
  document.getElementById("server-url").value = "";
  document.getElementById("secret-input").value = "";
  document.getElementById("login-overlay").style.display = "flex";
}

// ── CHAT ──────────────────────────────────────────────────────────────────────
function sendChat() {
  const input = document.getElementById("chat-input");
  const text = input.value.trim();
  if (!text || !ws || busy) return;
  input.value = ""; input.style.height = "40px";
  appendUser(text); setBusy(true);
  ws.send(JSON.stringify({ type: "chat", text }));
}

function killProcess() { if (ws) ws.send(JSON.stringify({ type: "kill" })); setBusy(false); }

function setBusy(state) {
  busy = state;
  document.getElementById("chat-typing").style.display = state ? "flex" : "none";
  document.getElementById("kill-btn").className = state ? "visible" : "";
  document.getElementById("send-btn").style.opacity = state ? "0.4" : "1";
}

function appendUser(text) {
  const msgs = document.getElementById("chat-messages");
  msgs.innerHTML += `<div class="msg user"><span class="msg-label">YOU</span><div class="msg-bubble">${esc(text)}</div></div>`;
  msgs.scrollTop = msgs.scrollHeight;
}

function appendAssistant(text) {
  const msgs = document.getElementById("chat-messages");
  msgs.innerHTML += `<div class="msg assistant"><span class="msg-label">CLAUDE CODE</span><div class="msg-bubble">${esc(text)}</div></div>`;
  msgs.scrollTop = msgs.scrollHeight;
}

// ── TERMINAL ──────────────────────────────────────────────────────────────────
function appendTerminal(text) {
  const t = document.getElementById("terminal-output");
  const span = document.createElement("span");
  if (text.includes("✓") || text.includes("success")) span.className = "t-success";
  else if (text.includes("✗") || text.includes("Error") || text.includes("error")) span.className = "t-error";
  else if (text.includes("▶") || text.includes("Connected")) span.className = "t-accent";
  span.textContent = text;
  t.appendChild(span);
  t.scrollTop = t.scrollHeight;
}

function clearTerminal() { document.getElementById("terminal-output").innerHTML = ""; }

// ── FILE BROWSER ──────────────────────────────────────────────────────────────
async function loadFiles(dir) {
  if (!serverUrl) return;
  currentPath = dir;
  document.getElementById("file-path-bar").textContent = "/" + dir;
  try {
    const r = await fetch(`${serverUrl}/api/files?path=${encodeURIComponent(dir)}&secret=${secret}`);
    const data = await r.json();
    renderFiles(data.entries, dir);
  } catch { toast("Error loading files"); }
}

function renderFiles(entries, dir) {
  const list = document.getElementById("file-list");
  list.innerHTML = "";
  if (dir) {
    const up = document.createElement("div");
    up.className = "file-entry";
    up.innerHTML = `<span class="icon">↩</span> ..`;
    up.onclick = () => loadFiles(dir.split("/").slice(0, -1).join("/"));
    list.appendChild(up);
  }
  entries.forEach(e => {
    const el = document.createElement("div");
    el.className = "file-entry";
    el.innerHTML = `<span class="icon">${e.type === "dir" ? "📁" : "📄"}</span> ${esc(e.name)}`;
    el.onclick = () => { e.type === "dir" ? loadFiles(e.path) : openFile(e.path, e.name); };
    el.oncontextmenu = (ev) => { ev.preventDefault(); deleteFile(e.path); };
    list.appendChild(el);
  });
}

async function openFile(filePath, name) {
  try {
    const r = await fetch(`${serverUrl}/api/file?path=${encodeURIComponent(filePath)}&secret=${secret}`);
    const data = await r.json();
    editingPath = filePath;
    document.getElementById("editor-textarea").value = data.content;
    document.getElementById("editor-filename").textContent = name;
    document.getElementById("file-editor").className = "visible";
  } catch { toast("Cannot open file"); }
}

async function saveFile() {
  const content = document.getElementById("editor-textarea").value;
  try {
    await fetch(`${serverUrl}/api/file`, { method: "POST", headers: { "Content-Type": "application/json", "x-secret": secret }, body: JSON.stringify({ filePath: editingPath, content }) });
    toast("Saved ✓");
  } catch { toast("Save failed"); }
}

function closeEditor() { document.getElementById("file-editor").className = ""; editingPath = ""; }

async function deleteFile(filePath) {
  if (!confirm(`Delete ${filePath}?`)) return;
  try {
    await fetch(`${serverUrl}/api/file?path=${encodeURIComponent(filePath)}&secret=${secret}`, { method: "DELETE", headers: { "x-secret": secret } });
    loadFiles(currentPath); toast("Deleted");
  } catch { toast("Delete failed"); }
}

// ── UPLOAD ────────────────────────────────────────────────────────────────────
async function uploadFiles(files) {
  if (!files.length) return;
  const form = new FormData();
  form.append("dir", currentPath);
  for (const f of files) form.append("files", f);
  try {
    const r = await fetch(`${serverUrl}/api/upload`, { method: "POST", headers: { "x-secret": secret }, body: form });
    const data = await r.json();
    toast(`Uploaded: ${data.uploaded.join(", ")}`); loadFiles(currentPath);
  } catch { toast("Upload failed"); }
}

const dropArea = document.getElementById("drop-area");
dropArea.addEventListener("dragover", e => { e.preventDefault(); dropArea.classList.add("dragover"); });
dropArea.addEventListener("dragleave", () => dropArea.classList.remove("dragover"));
dropArea.addEventListener("drop", e => { e.preventDefault(); dropArea.classList.remove("dragover"); uploadFiles(e.dataTransfer.files); });

document.getElementById("chat-input").addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendChat(); }
  setTimeout(() => { const el = e.target; el.style.height = "40px"; el.style.height = Math.min(el.scrollHeight, 120) + "px"; }, 0);
});

function esc(t) { return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function toast(msg, duration = 2500) {
  const el = document.getElementById("toast");
  el.textContent = msg; el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), duration);
}
</script>
</body>
</html>
